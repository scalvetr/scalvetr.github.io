<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {

        const codeBlocks = document.querySelectorAll('pre code.language-mermaid');

        if (codeBlocks.length > 0) {
            codeBlocks.forEach(function(codeBlock) {
                const preBlock = codeBlock.parentNode;
                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = codeBlock.textContent;
                preBlock.parentNode.replaceChild(mermaidDiv, preBlock);
            });

            mermaid.initialize({
                startOnLoad: true,
                theme: 'base', // 'base' allows us to completely override with our own hex codes
                themeVariables: {
                    background: '#1e1e1e',          // Matches standard dark mode backgrounds
                    primaryColor: '#263238',        // Slate/Navy blue for the main node fill
                    primaryTextColor: '#ffffff',    // Crisp white text inside nodes
                    primaryBorderColor: '#64b5f6',  // Azure blue accent for node borders
                    lineColor: '#90a4ae',           // Muted slate grey for connection arrows
                    tertiaryColor: '#37474f',       // Slightly lighter slate for subgraphs/groups
                    fontFamily: 'monospace'
                }
            });
        }
    });
</script>
